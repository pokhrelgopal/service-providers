# Production-like stack: builds the API + web images and runs them alongside
# Postgres, Redis, and MinIO on an internal network. Configure secrets via a
# root .env.prod (see .env.prod.example). Run:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#   docker compose -f docker-compose.prod.yml run --rm migrate   # one-off

name: servio-prod

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data

  api:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env.prod
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5000:5000"

  # One-off migration runner. `docker compose ... run --rm migrate`
  migrate:
    build:
      context: ./backend
    env_file: .env.prod
    environment:
      NODE_ENV: production
    command: ["npm", "run", "migration:run:prod"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      - api
    ports:
      - "3000:3000"

  # Self-hosted routing. Run ./docker/osrm/prepare.sh once first. Browsers hit
  # this directly, so front it with TLS and set NEXT_PUBLIC_OSRM_URL at build.
  osrm:
    image: osrm/osrm-backend:latest
    restart: unless-stopped
    command: ["osrm-routed", "--algorithm", "mld", "/data/region.osrm"]
    volumes:
      - ./docker/osrm:/data
    ports:
      - "5001:5000"

volumes:
  pgdata:
  redisdata:
  miniodata:
