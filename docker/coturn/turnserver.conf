# coturn config for local dev / self-hosted TURN relay.
#
# Auth uses the "TURN REST" / use-auth-secret scheme: the backend mints
# short-lived credentials by HMAC-ing "<expiry>:<userId>" with `static-auth-secret`.
# The same secret MUST be set as TURN_SECRET in the backend env.
#
# Start it with:  docker compose --profile calls up -d coturn
#
# NOTE for real deployments: TURN needs a public IP and the relay UDP port range
# reachable from the internet. Set `external-ip=<PUBLIC_IP>` and run with host
# networking (or open min-port–max-port). On cloud, prefer a dedicated host.

listening-port=3478

# Ephemeral, HMAC-based credentials (no per-user passwords stored).
use-auth-secret
static-auth-secret=dev-turn-secret-change-me

realm=servio.local

fingerprint

# Relay port range (kept small for dev; widen in production).
min-port=49160
max-port=49200

# Dev: plain TURN only (no TLS certs locally).
no-tls
no-dtls
no-cli
no-multicast-peers

# Don't relay to private/loopback ranges from untrusted peers in production;
# left permissive here for local testing between two machines.
log-file=stdout
